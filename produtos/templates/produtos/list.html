{% extends "produtos/base.html" %}
{% load static %}

{% block title %}Lista de Produtos{% endblock %}

{% block content %}
{% csrf_token %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Produtos</h2>
    <a href="{% url 'produtos:create' %}" class="btn btn-primary">+ Novo Produto</a>
</div>

<div class="mb-3">
    <input type="text" id="busca" class="form-control" placeholder="Pesquisar por nome...">
</div>

<table class="table table-striped table-hover align-middle">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Quantidade</th>
            <th class="text-end">Ações</th>
        </tr>
    </thead>
    <tbody id="tabela-produtos">
        <tr><td colspan="5" class="text-center text-muted">Carregando...</td></tr>
    </tbody>
</table>
{% endblock %}

{% block scripts %}
<script src="{% static 'produtos/js/main.js' %}"></script>
{% endblock %}
